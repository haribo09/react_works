<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반복문-for</title>
</head>
<body>
    <script>
        let i = 1;
        for(i = 1; i <= 10; i++) {
            console.log(i);
        }

        console.log("=====================");
        
        let j = 1;
        for(j = 1; j <= 10; j++) {
            if(j % 2 === 1) {
                console.log(j);
            }
        }
    </script>
</body>
</html>
