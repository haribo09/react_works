<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>변수와 자료형</title>
</head>
<body>
    <h2>변수와 자료형</h2>

    <script>
        //변수 선언 - 자료형 표기는 var, let
        var name = "Alice"; //문자형
        var age = 30; //숫자형
        let isStudent = false; //불린형


        //출력
        console.log("Name:", name); // 콘솔에 출력
        console.log("Age:", age); // 콘솔에 출력
        console.log("Is Student:", isStudent);
        
        //호이스팅(끌어 올려짐)
        console.log(x); //undefined(할당하지 않음)
        var x = 5;
        
        //let을 사용하면 호이스팅 되지 않음
        // console.log(y);
        // let y = 10;

        //상수 선언
        const z = 20;
        // z = 50; //상수는 재할당할 수 없음
        console.log("Z:", z);
    </script>
</body>
</html>
