<!DOCTYPE html>

<body>
    <h2>While문</h2>

    <script>
        //1부터 5까지 출력하는 while문
        // let i = 1;
        // while(i <= 5) {
        //     console.log(i);

        //1~10 중 짝수만 출력
        let j = 1;
        while(j <= 10) {
            if(j % 2 === 0) {
                console.log(j);
            }
            j++;
        }
    </script>
